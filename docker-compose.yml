services:

  # ---------------------------------------------------------------------------
  # Databases
  # ---------------------------------------------------------------------------

  gio-apim-mongodb:
    image: mongo:${MONGODB_VERSION:-8.0.18}
    container_name: gio-apim-mongodb
    restart: unless-stopped
    networks: [southbound]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/27017"]
      interval: 5s
      timeout: 3s
      retries: 10

  gio-apim-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-9.2.5}
    container_name: gio-apim-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks: [southbound]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Gravitee APIM
  # ---------------------------------------------------------------------------

  gio-apim-gateway:
    image: ${APIM_REGISTRY:-graviteeio}/apim-gateway:${APIM_VERSION_GATEWAY:-4.10.7-debian}
    container_name: gio-apim-gateway
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      gio-apim-mongodb:
        condition: service_healthy
      gio-apim-elasticsearch:
        condition: service_healthy
      agent-live-graph:
        condition: service_started
    environment:
      - gravitee_management_mongodb_uri=mongodb://gio-apim-mongodb:27017/gravitee?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
      - gravitee_ratelimit_mongodb_uri=mongodb://gio-apim-mongodb:27017/gravitee?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
      - gravitee_reporters_elasticsearch_endpoints_0=http://gio-apim-elasticsearch:9200
      - gravitee_services_inference_timeout=120000
      - GRAVITEE_LICENSE_KEY=${GRAVITEE_LICENSE}
      # TCP Reporter — sends JSON events to AI Agent Inspector for real-time visualisation
      - gravitee_reporters_tcp_enabled=true
      - gravitee_reporters_tcp_host=agent-live-graph
      - gravitee_reporters_tcp_port=9001
      - gravitee_reporters_tcp_output=json
    volumes:
      # ONNX toxicity classifier model for AI Guard Rails
      - ./apim-gateway-models:/opt/graviteeio-gateway/models
    networks: [northbound, southbound]

  gio-apim-management-api:
    image: ${APIM_REGISTRY:-graviteeio}/apim-management-api:${APIM_VERSION:-4.10.6}
    container_name: gio-apim-management-api
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      gio-apim-mongodb:
        condition: service_healthy
      gio-apim-elasticsearch:
        condition: service_healthy
    environment:
      - gravitee_management_mongodb_uri=mongodb://gio-apim-mongodb:27017/gravitee?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
      - gravitee_analytics_elasticsearch_endpoints_0=http://gio-apim-elasticsearch:9200
      - GRAVITEE_LICENSE_KEY=${GRAVITEE_LICENSE}
    networks: [northbound, southbound]

  gio-apim-management-ui:
    image: ${APIM_REGISTRY:-graviteeio}/apim-management-ui:${APIM_VERSION:-4.10.6}
    container_name: gio-apim-management-ui
    restart: unless-stopped
    ports:
      - "8084:8080"
    depends_on:
      - gio-apim-management-api
    environment:
      - MGMT_API_URL=http://localhost:8083/
    networks: [northbound]

  gio-apim-portal-ui:
    image: ${APIM_REGISTRY:-graviteeio}/apim-portal-ui:${APIM_VERSION:-4.10.6}
    container_name: gio-apim-portal-ui
    restart: unless-stopped
    ports:
      - "8085:8080"
    depends_on:
      - gio-apim-management-api
    environment:
      - PORTAL_API_URL=http://localhost:8083/portal/environments/DEFAULT
    networks: [northbound]

  # ---------------------------------------------------------------------------
  # Gravitee Access Management
  # ---------------------------------------------------------------------------

  gio-am-management-api:
    image: ${AM_REGISTRY:-graviteeio}/am-management-api:${AM_VERSION:-4.10.6}
    container_name: gio-am-management-api
    restart: unless-stopped
    ports:
      - "8093:8093"
      - "18093:18093"
    depends_on:
      gio-apim-mongodb:
        condition: service_healthy
    healthcheck:
      test: >
        sh -c '
        response=$$(curl -s -u admin:adminadmin http://localhost:18093/_node/health);
        if echo "$$response" | grep -Eq "\"healthy\"[[:space:]]*:[[:space:]]*false"; then exit 1; else exit 0; fi
        '
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      - gravitee_license_key=${GRAVITEE_LICENSE}
      - gravitee_services_core_http_host=0.0.0.0
      - gravitee_management_mongodb_uri=mongodb://gio-apim-mongodb:27017/graviteeam?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
      - gravitee_oauth2_mongodb_uri=mongodb://gio-apim-mongodb:27017/graviteeam?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
      - gravitee_dataPlanes_0_mongodb_uri=mongodb://gio-apim-mongodb:27017/graviteeam?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
    networks: [southbound, northbound]

  gio-am-gateway:
    image: ${AM_REGISTRY:-graviteeio}/am-gateway:${AM_VERSION:-4.10.6}
    container_name: gio-am-gateway
    restart: unless-stopped
    ports:
      - "8092:8092"
    depends_on:
      gio-apim-mongodb:
        condition: service_healthy
      gio-am-management-api:
        condition: service_started
    environment:
      - gravitee_license_key=${GRAVITEE_LICENSE}
      - gravitee_management_mongodb_uri=mongodb://gio-apim-mongodb:27017/graviteeam?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
      - gravitee_oauth2_mongodb_uri=mongodb://gio-apim-mongodb:27017/graviteeam?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
    networks: [southbound, northbound]

  gio-am-management-ui:
    image: ${AM_REGISTRY:-graviteeio}/am-management-ui:${AM_VERSION:-4.10.6}
    container_name: gio-am-management-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - gio-am-management-api
    environment:
      - MGMT_API_URL=http://localhost:8093
      - MGMT_UI_URL=http://localhost:8081
    networks: [northbound]

  # ---------------------------------------------------------------------------
  # MCP Inspector
  # ---------------------------------------------------------------------------

  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    container_name: mcp-inspector
    restart: unless-stopped
    ports:
      - "6274:6274"
      - "6277:6277"
    environment:
      - DANGEROUSLY_OMIT_AUTH=true
      - HOST=0.0.0.0
      # Pre-configure MCP Inspector to connect to the RNLI Lifeboat MCP server
      # Open http://localhost:6274 → select Streamable HTTP → URL is pre-filled
      - MCP_SERVER_URL=http://gio-apim-gateway:8082/lifeboat-mcp/mcp
    networks: [southbound, northbound]

  # ---------------------------------------------------------------------------
  # Gravitee Init
  # ---------------------------------------------------------------------------

  gio-gravitee-init:
    build:
      context: ./gravitee-init
      dockerfile: Dockerfile
    container_name: gio-gravitee-init
    restart: "no"
    depends_on:
      - gio-apim-management-api
      - gio-am-management-api
    environment:
      - APIM_BASE_URL=http://gio-apim-management-api:8083
      - AM_BASE_URL=http://gio-am-management-api:8093
      # Guard Rails sensitivity threshold (0.0–1.0). Lower = more sensitive.
      # Default in 03-llm-proxy.json is 0.5. Override here to tune without editing JSON.
      # - GUARD_RAILS_THRESHOLD=0.5
    networks: [southbound]

  # ---------------------------------------------------------------------------
  # RNLI Services
  # ---------------------------------------------------------------------------

  lifeboat-api:
    build:
      context: ./lifeboat-api
      dockerfile: Dockerfile
    container_name: lifeboat-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    networks: [northbound, southbound]

  databricks-stations-api:
    build:
      context: ./databricks-stations-api
      dockerfile: Dockerfile
    container_name: databricks-stations-api
    restart: unless-stopped
    ports:
      - "8004:8000"
    networks: [northbound, southbound]

  rnli-a2a-agent:
    build:
      context: ./rnli-a2a-agent
      dockerfile: Dockerfile
    container_name: rnli-a2a-agent
    restart: unless-stopped
    ports:
      - "8003:8001"
    depends_on:
      - lifeboat-api
      - gio-apim-gateway
    environment:
      - LIFEBOAT_API_BASE=http://lifeboat-api:8000
      - LLM_BASE_URL=http://gio-apim-gateway:8082/llm-proxy
      - LLM_MODEL=qwen3:0.6b
      - AGENT_SERVER_PORT=8001
      # Tool calls route through the Gravitee MCP server — traffic visible in APIM analytics
      - MCP_HTTP_URL=http://gio-apim-gateway:8082/lifeboat-mcp/mcp
    networks: [northbound, southbound]

  rnli-website:
    build:
      context: ./rnli-website
      dockerfile: Dockerfile
    container_name: rnli-website
    restart: unless-stopped
    ports:
      - "8002:80"
    # Override env vars to point the website at a different gateway / auth server.
    # Defaults (localhost) are set in rnli-website/docker-entrypoint.d/40-env-config.sh
    # environment:
    #   AGENT_CARD_URL: http://localhost:8082/stations-agent/.well-known/agent-card.json
    #   OIDC_URL: http://localhost:8092/gravitee/oidc/.well-known/openid-configuration
    #   OIDC_CLIENT_ID: rnli-lifeboat
    #   REDIRECT_URI: http://localhost:8002/
    #   VISITED_STATIONS_URL: http://localhost:8082/visited-stations/history
    networks: [northbound]

  # ---------------------------------------------------------------------------
  # AI Agent Inspector (real-time visualisation of the agent flow)
  # ---------------------------------------------------------------------------

  agent-live-graph:
    build:
      context: ./agent-live-graph
      dockerfile: Dockerfile
    container_name: agent-live-graph
    restart: unless-stopped
    ports:
      - "9002:9002"  # Web UI + WebSocket
    environment:
      - HTTP_PORT=9002  # Web UI and WebSocket
      - TCP_PORT=9001   # Receives TCP events from the APIM Gateway TCP Reporter
    networks: [southbound, northbound]

networks:
  northbound:
    name: northbound
  southbound:
    name: southbound
